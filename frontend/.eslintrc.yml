env:
  browser: true
  es2021: true
extends:
  - xo
  - plugin:react/recommended
  - prettier
overrides:
  - extends:
      - xo-typescript
    files:
      - '*.ts'
      - '*.tsx'
parserOptions:
  ecmaVersion: latest
  sourceType: module
plugins:
  - react
  - prettier
rules:
  prettier/prettier: error

settings:
  react:
    pragma: 'React'
    version: 'detect'
